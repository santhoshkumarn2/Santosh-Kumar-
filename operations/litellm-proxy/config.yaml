# =========================================================================
# LiteLLM Proxy Configuration - Dynamic DB & Model Endpoints Mode
# =========================================================================
# Models, keys, and provider endpoints are stored dynamically in DB memory
# and managed via LiteLLM Admin API (/model/new, /key/generate) or UI.
# No credentials or API keys are hardcoded in this configuration file.
# =========================================================================

model_list: [] # Populated dynamically via LiteLLM Database & Admin API

router_settings:
  routing_strategy: usage-based-routing-v2
  num_retries: 3
  timeout: 30

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
